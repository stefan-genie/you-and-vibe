services:
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - default

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/vibe-sandbox:/tmp/vibe-sandbox
    environment:
      - JELLY_NETWORK=jelly-net
      - RUNNER_IMAGE=sandbox-runner:latest
      - SANDBOX_TMP_BASE=/tmp/vibe-sandbox
    networks:
      - default
      - jelly-net

  jelly-service:
    build: ./sandbox/jelly-service
    networks:
      - default
      - jelly-net

  runner:
    build: ./sandbox/runner-image
    image: sandbox-runner:latest
    profiles:
      - build-only

networks:
  default:
    name: vibe-default
    driver: bridge
  jelly-net:
    name: jelly-net
    internal: true
    driver: bridge

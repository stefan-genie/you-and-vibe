services:
  frontend:
    build: ./frontend
    expose:
      - "80"
    networks:
      - default

  backend:
    build: ./backend
    env_file: .env
    expose:
      - "3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/vibe-sandbox:/tmp/vibe-sandbox
    environment:
      - JELLY_NETWORK=jelly-net
      - RUNNER_IMAGE=sandbox-runner:latest
      - SANDBOX_TMP_BASE=/tmp/vibe-sandbox
      - ACCESS_CODE_SECRET=${ACCESS_CODE_SECRET}
    networks:
      - default
      - jelly-net

  jelly-service:
    build: ./sandbox/jelly-service
    networks:
      - default
      - jelly-net

  runner:
    build: ./sandbox/runner-image
    image: sandbox-runner:latest
    networks:
      - jelly-net
    command: ["echo", "runner image built; not a long-running service"]
    restart: "no"

networks:
  default:
    name: vibe-default
    driver: bridge
  jelly-net:
    name: jelly-net
    internal: true
    driver: bridge
